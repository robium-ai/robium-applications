steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - docker/Dockerfile
      - -t
      - us-central1-docker.pkg.dev/robium-prod/robium/demo-nav-trial:latest
      - .

images:
  - us-central1-docker.pkg.dev/robium-prod/robium/demo-nav-trial:latest

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
